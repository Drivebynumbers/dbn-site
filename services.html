<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI For Your Business тАФ DriveByNumbers</title>
<meta name="description" content="We build custom AI tools, automations, and websites for small businesses. No agencies, no fluff тАФ just results.">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --gold: #c8952a;
    --gold-light: #e8b04a;
    --teal: #2e8b7a;
    --teal-light: #3aa896;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }

  /* Nav */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-icon { width: 32px; height: 32px; background: var(--gold); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #000; }
  .nav-logo-text { font-weight: 700; font-size: 17px; color: var(--text); }
  .nav-logo-text span { color: var(--gold); }
  .nav-cta { background: var(--gold); color: #000; font-weight: 700; padding: 8px 18px; border-radius: 6px; text-decoration: none; font-size: 14px; }
  .nav-cta:hover { background: var(--gold-light); }

  /* Layout */
  .container { max-width: 1040px; margin: 0 auto; padding: 0 20px; }
  section { padding: 80px 0; }
  .section-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: 700; margin-bottom: 12px; }
  .section-title { font-size: clamp(28px, 4vw, 44px); font-weight: 900; line-height: 1.1; margin-bottom: 16px; }
  .section-sub { color: var(--muted); font-size: 16px; line-height: 1.7; max-width: 560px; }
  hr { border: none; border-top: 1px solid var(--border); }

  /* Hero */
  .hero {
    min-height: 90vh; display: flex; align-items: center;
    padding: 80px 20px; position: relative; overflow: hidden;
  }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 30%, rgba(200,149,42,0.07) 0%, transparent 70%); pointer-events: none; }
  .hero-inner { position: relative; max-width: 1040px; margin: 0 auto; width: 100%; }
  .hero-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(200,149,42,0.1); border: 1px solid rgba(200,149,42,0.25); color: var(--gold); padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
  .hero h1 { font-size: clamp(36px, 6vw, 66px); font-weight: 900; line-height: 1.05; margin-bottom: 20px; letter-spacing: -1.5px; max-width: 760px; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { font-size: clamp(16px, 2vw, 20px); color: var(--muted); max-width: 560px; margin-bottom: 36px; }
  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 56px; }
  .btn-gold { background: var(--gold); color: #000; font-weight: 700; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-size: 16px; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 16px; }
  .btn-ghost:hover { border-color: var(--teal); color: var(--teal-light); }
  .hero-proof { display: flex; gap: 32px; flex-wrap: wrap; }
  .proof-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); }
  .proof-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; }

  /* Problem section */
  #problem { background: var(--surface); }
  .problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  @media(max-width:700px) { .problem-grid { grid-template-columns: 1fr; } }
  .pain-list { list-style: none; margin-top: 24px; }
  .pain-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .pain-item:last-child { border-bottom: none; }
  .pain-x { color: #f85149; font-weight: 700; font-size: 18px; flex-shrink: 0; }
  .solution-box { background: var(--bg); border: 1px solid rgba(200,149,42,0.3); border-radius: 12px; padding: 32px; position: relative; overflow: hidden; }
  .solution-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--teal)); }
  .solution-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .solution-item:last-child { border-bottom: none; }
  .solution-check { color: var(--green); font-weight: 700; font-size: 16px; flex-shrink: 0; }

  /* Services */
  #services { background: var(--bg); }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 48px; }
  .service-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; transition: border-color 0.2s, transform 0.2s; }
  .service-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .service-icon { font-size: 36px; margin-bottom: 14px; }
  .service-name { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .service-desc { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
  .service-examples { list-style: none; }
  .service-examples li { font-size: 13px; color: var(--muted); padding: 4px 0; display: flex; gap: 8px; }
  .service-examples li::before { content: 'тЖТ'; color: var(--gold); flex-shrink: 0; }
  .service-price { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--gold); font-weight: 700; }

  /* Process */
  #process { background: var(--surface); }
  .process-steps { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 48px; }
  .process-step { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; position: relative; }
  .step-number { font-size: 48px; font-weight: 900; color: rgba(200,149,42,0.15); line-height: 1; margin-bottom: 8px; }
  .step-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .step-time { margin-top: 12px; font-size: 12px; color: var(--teal-light); font-weight: 700; }

  /* Why us */
  #why { background: var(--bg); }
  .why-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 48px; }
  .why-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; }
  .why-icon { font-size: 26px; margin-bottom: 10px; }
  .why-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .why-text { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* Pricing */
  #pricing { background: var(--surface); }
  .pricing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 48px; }
  .pricing-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 28px; position: relative; }
