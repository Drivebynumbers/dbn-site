<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBN Academy — Learn to Trade Like an Institution</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.app{display:flex;min-height:100vh}
/* ── SIDEBAR ── */
.sidebar{width:260px;min-width:260px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid #30363d}
.sidebar-logo .brand{font-size:18px;font-weight:700;color:#e6edf3;letter-spacing:-0.3px}
.sidebar-logo .tagline{font-size:12px;color:#8b949e;margin-top:3px}
.xp-bar-wrap{padding:14px 16px;border-bottom:1px solid #30363d}
.xp-label{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;margin-bottom:6px}
.xp-bar{height:6px;background:#30363d;border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#00A878,#00d4a0);border-radius:3px;transition:width .4s ease}
.xp-stats{font-size:11px;color:#8b949e;margin-top:5px}
.sidebar-nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:0;transition:background .15s;font-size:13px;color:#8b949e;border-left:3px solid transparent}
.nav-item:hover{background:#1c2128;color:#e6edf3}
.nav-item.active{background:#1c2128;color:#e6edf3;border-left-color:#00A878}
.nav-item .nav-icon{font-size:16px;width:22px;text-align:center}
.nav-item .nav-title{flex:1;font-weight:500}
.nav-item .nav-count{font-size:11px;background:#30363d;padding:1px 6px;border-radius:10px}
.sidebar-footer{padding:12px 16px;border-top:1px solid #30363d}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#8b949e;cursor:pointer;padding:6px 0}
.back-btn:hover{color:#e6edf3}
/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:32px}
/* ── HOME ── */
.home-header{margin-bottom:28px}
.home-header h1{font-size:28px;font-weight:700;color:#e6edf3;letter-spacing:-0.5px}
.home-header p{font-size:14px;color:#8b949e;margin-top:8px;max-width:560px;line-height:1.6}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.module-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.module-card:hover{border-color:#484f58;transform:translateY(-2px)}
.module-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.module-icon-wrap{font-size:24px}
.module-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:4px;background:#30363d;color:#8b949e}
.module-tag.free{background:#0d2818;color:#00A878}
.module-tag.premium{background:#2a1a00;color:#FFD700}
.module-card h3{font-size:15px;font-weight:600;color:#e6edf3;margin-bottom:8px;line-height:1.35}
.module-card p{font-size:12px;color:#8b949e;line-height:1.6;margin-bottom:14px}
.module-meta{font-size:11px;color:#8b949e;display:flex;align-items:center;gap:8px}
.module-progress{height:3px;background:#30363d;border-radius:2px;margin-top:10px;overflow:hidden}
.module-progress-fill{height:100%;border-radius:2px;transition:width .3s ease}
/* ── MODULE PAGE ── */
.module-page-header{margin-bottom:24px}
.module-page-header .module-title-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.module-page-header .big-icon{font-size:32px}
.module-page-header h2{font-size:22px;font-weight:700;color:#e6edf3}
.module-page-header p{font-size:13px;color:#8b949e;line-height:1.6;max-width:600px}
.concept-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.concept-item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px 20px;cursor:pointer;transition:border-color .2s;display:flex;align-items:center;justify-content:space-between}
.concept-item:hover{border-color:#484f58}
.concept-item.done{border-color:#00A878;background:#0d1f17}
.concept-item-left{}
.concept-item-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:4px}
.concept-item-name{font-size:14px;font-weight:500;color:#e6edf3}
.concept-item-sub{font-size:12px;color:#8b949e;margin-top:2px}
.concept-item-right{display:flex;align-items:center;gap:8px}
.done-badge{font-size:16px;color:#00A878}
.chevron{color:#8b949e;font-size:14px}
.quiz-btn{background:#161b22;border:1px dashed #30363d;border-radius:8px;padding:16px 20px;cursor:pointer;text-align:center;font-size:13px;color:#8b949e;transition:border-color .2s,color .2s}
.quiz-btn:hover{border-color:#FFD700;color:#FFD700}
/* ── CONCEPT READER ── */
.concept-reader{max-width:720px}
.concept-reader-header{margin-bottom:24px}
.concept-reader-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#8b949e;margin-bottom:8px}
.concept-reader-title{font-size:24px;font-weight:700;color:#e6edf3;margin-bottom:6px;line-height:1.25}
.concept-reader-sub{font-size:14px;color:#8b949e;line-height:1.6}
.concept-body{font-size:14px;color:#c9d1d9;line-height:1.8;margin-bottom:24px}
.concept-body strong{color:#e6edf3}
.concept-highlight{background:#0d2818;border-left:3px solid #00A878;border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:24px;font-size:13px;color:#e6edf3;line-height:1.6;font-style:italic}
.pills-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
.pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:#30363d;color:#8b949e;letter-spacing:.3px}
.concept-nav{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid #30363d}
.mark-done-btn{background:#00A878;color:#000;border:none;padding:9px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.mark-done-btn:hover{opacity:.85}
.mark-done-btn.done{background:#0d2818;color:#00A878;border:1px solid #00A878}
.nav-btn{background:#161b22;color:#8b949e;border:1px solid #30363d;padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;transition:border-color .2s,color .2s}
.nav-btn:hover{border-color:#484f58;color:#e6edf3}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
/* ── QUIZ ── */
.quiz-wrap{max-width:680px}
.quiz-header{margin-bottom:28px}
.quiz-header h2{font-size:22px;font-weight:700;margin-bottom:6px}
.quiz-progress-text{font-size:13px;color:#8b949e}
.quiz-bar{height:4px;background:#30363d;border-radius:2px;margin-top:10px;overflow:hidden}
.quiz-bar-fill{height:100%;background:#00A878;border-radius:2px;transition:width .3s}
.question-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:24px;margin-bottom:20px}
.question-hint{font-size:11px;color:#8b949e;margin-bottom:12px;font-style:italic}
.question-text{font-size:16px;font-weight:600;color:#e6edf3;line-height:1.45;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.option{background:#1c2128;border:1px solid #30363d;border-radius:7px;padding:12px 16px;cursor:pointer;font-size:13px;color:#c9d1d9;transition:border-color .15s;text-align:left}
.option:hover:not(.locked){border-color:#484f58;color:#e6edf3}
.option.selected{border-color:#388bfd;color:#e6edf3}
.option.correct{border-color:#00A878;background:#0d2818;color:#00A878}
.option.wrong{border-color:#f85149;background:#2a0d0d;color:#f85149}
.option.locked{cursor:not-allowed}
.explanation{background:#1c2128;border-left:3px solid #388bfd;border-radius:0 8px 8px 0;padding:14px 18px;font-size:13px;color:#c9d1d9;line-height:1.6;margin-bottom:20px}
.quiz-actions{display:flex;justify-content:space-between;align-items:center}
.next-btn{background:#00A878;color:#000;border:none;padding:10px 24px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.next-btn:hover{opacity:.85}
.score-badge{font-size:13px;color:#8b949e}
.quiz-done{text-align:center;padding:40px 20px}
.quiz-done-icon{font-size:48px;margin-bottom:16px}
.quiz-done h3{font-size:24px;font-weight:700;margin-bottom:8px}
.quiz-done p{color:#8b949e;margin-bottom:24px;line-height:1.6}
.retake-btn{background:#30363d;color:#e6edf3;border:none;padding:10px 24px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-right:10px}
.retake-btn:hover{background:#484f58}
@media(max-width:768px){.sidebar{display:none}.main{padding:20px}}
</style>
</head>
<body>

<script type="text/babel">
const { useState } = React;

const MODULES = [
  {

    title: 'Market Structure Foundations',
    desc: 'Swing highs, swing lows, BOS and CHoCH — the language institutions use to move price.',

    tag: 'free',

      {
        id: 'swing',
        name: 'Swing High / Swing Low',
        tag: 'Foundation',
        subtitle: 'The building blocks of all market structure analysis',
        body: `A <strong>Swing High</strong> is a candle with a higher high on both sides — price moved up, peaked, then pulled back. A <strong>Swing Low</strong> is the opposite — a trough with lower lows on each side.\n\nInstitutions don't look at price randomly. They look at these structural points as the map of where orders live. Every swing high has <strong>buy-side liquidity</strong> sitting above it (retail stop losses from short traders). Every swing low has <strong>sell-side liquidity</strong> sitting below it.\n\nThese are the stop losses of long traders. If price dips below the low, they sell to close. Institutions buy that selling.\n\nLarge institutions can't just click "buy 1,000 lots" — the market doesn't have that liquidity sitting there. They need retail stop losses to create the orders they fill against.`,

        subtitle: 'Trend continuation confirmed by institutional participation',
        body: `A <strong>Break of Structure (BOS)</strong> occurs when price closes beyond a previous swing point in the direction of the current trend.\n\nIn an uptrend: price breaks above a previous Swing High → BOS. This confirms institutional buyers are still active and the trend is continuing.\n\nIn a downtrend: price closes below a previous Swing Low → BOS. Smart money is still selling.\n\nA BOS tells you: <strong>the current trend has momentum and is being driven by institutions, not retail.</strong>`,
        highlight: 'BOS = go WITH the trend. It\'s a continuation signal. Institutions are adding to positions, not reversing.',
        pills: ['Trend', 'Continuation', 'Institutional']
      },
      {
        id: 'choch',
        name: 'Change of Character (CHoCH)',

        subtitle: 'The first signal that institutions are switching direction',
        body: `A <strong>Change of Character (CHoCH)</strong> is the FIRST break of structure against the current trend. It's the earliest warning that institutions may be reversing.\n\nIn a downtrend: the first time price closes above a previous Swing High → CHoCH. Smart money might be accumulating longs.\n\nIn an uptrend: the first close below a previous Swing Low → CHoCH. Distribution may be happening.\n\n<strong>CHoCH is not confirmation — it's a warning.</strong> Wait for additional confluence before entering. One CHoCH alone doesn't mean a full reversal.`,

  {
    id: 'liquidity',
    icon: '💧',
    title: 'Liquidity & Order Flow',
    desc: 'Where stop losses cluster, why institutions hunt them, and how to trade with that knowledge.',

    concepts: [
      {
        id: 'ssl-bsl',
        name: 'Buyside & Sellside Liquidity',
        tag: 'Liquidity',
        subtitle: 'Stop loss clusters that institutions need to fill large orders',
        body: `<strong>Buyside Liquidity (BSL)</strong> sits above swing highs. These are the stop losses of traders who are short — if price moves up and takes out the high, their stops trigger and they buy to close. That buying is what institutions sell into.\n\n<strong>Sellside Liquidity (SSL)</strong> sits below swing lows. These are the stop losses of long traders. If price dips below the low, they sell to close. Institutions buy that selling.\n\nLarge institutions can't just click "buy 1,000 lots" — the market doesn't have that liquidity sitting there. They need retail stop losses to create the orders they fill against.`,
        highlight: 'Every time you see price spike through a high or low and immediately reverse — that\'s a liquidity sweep. Institutions just collected the stops they needed to fill their position.',
        pills: ['BSL', 'SSL', 'Stop Hunt', 'S1 Strategy']
      },
      {
        id: 'eqh-eql',
        name: 'Equal Highs & Equal Lows (EQH/EQL)',
        tag: 'Liquidity',
        subtitle: 'Double-top/bottom structures that are actually stop clusters',
        body: `When price touches the same level twice without breaking through, retail traders see a <strong>double top or double bottom</strong> and sell/buy the "resistance" or "support."\n\nInstitutions see something different: a massive cluster of stop losses all sitting at the same price level. <strong>Equal Highs (EQH)</strong> = BSL. <strong>Equal Lows (EQL)</strong> = SSL.\n\nThe more times price touches a level without breaking, the more stops cluster there, and the more attractive that level is for an institutional sweep.\n\nOn the DBN indicator, EQH/EQL levels are marked with dotted lines specifically so you can anticipate where the next liquidity hunt is likely to go.`,

      },
      {
        id: 'sweep',
        name: 'Liquidity Sweep',
        tag: 'Liquidity',

        body: `A <strong>Liquidity Sweep</strong> is when price briefly pierces through a swing point, collects the stop losses waiting there, then reverses aggressively in the opposite direction.\n\nKey characteristics:\n<strong>• Speed</strong> — sweeps happen fast, often within one or two candles\n<strong>• Body vs wick</strong> — the candle body closes back on the other side of the level. The wick is the sweep\n<strong>• Volume</strong> — sweeps on above-average volume confirm institutional participation\n<strong>• Follow-through</strong> — a real sweep is followed by a strong structural break (CHoCH)\n\nThe DBN S1 strategy specifically waits for a sweep of a swing low (SSL) followed by a CHoCH to the upside before entering long.`,

        tag: 'Imbalance',

        body: `A <strong>Fair Value Gap (FVG)</strong> is a three-candle pattern where the wicks of the first and third candle don't overlap. The gap between them represents a zone where price moved so fast that the market didn't get a chance to trade fairly at those prices.\n\nInstitutions often return price to these gaps to:\n1. Allow latecomers to enter\n2. Fill their own remaining orders\n3. "Rebalance" the price inefficiency\n\n<strong>Bullish FVG</strong>: gap between candle 1 high and candle 3 low (price shot up fast). Expect price to pull back and find support here.\n\n<strong>Bearish FVG</strong>: gap between candle 1 low and candle 3 high. Expect price to pull back and find resistance here.`,
        highlight: 'FVGs are the DBN indicator\'s primary entry zone reference. When price returns to an FVG after a sweep and CHoCH, that\'s the institutional entry.',
        pills: ['Imbalance', 'Entry Zone', 'Rebalance', 'All Strategies']

  {

    icon: '🎯',

    tag: 'free',
    concepts: [
      {
        id: 'ote-zone',
        name: 'OTE Zone (62–79%)',
        tag: 'Fibonacci',
        subtitle: 'The algorithmic retracement zone where institutions accumulate',
        body: `After a swing high to swing low move (or vice versa), the OTE is the zone between the <strong>62% and 79% retracement</strong> levels. The 70.5% level specifically is called the algorithmic midpoint — the price where institutional algorithms are programmed to accumulate positions.\n\nWhy these levels? Because institutions don't chase price. They wait for pullbacks to these deep retracement levels before entering, which means retail traders who bought the breakout are now underwater — and institutions are just getting in.`,

        pills: ['Fibonacci', '62%', '79%', 'ICT', 'S1 Strategy']

      {
        id: 'order-block',
        name: 'Order Block (OB)',
        tag: 'ICT Concept',
        subtitle: 'The last opposing candle before a structural break — institutional fingerprints',
        body: `An <strong>Order Block (OB)</strong> is the last bearish candle before a bullish structural break, or the last bullish candle before a bearish structural break.\n\nWhy does this matter? Because that candle represents where institutions placed their orders before driving price through structure. When price returns to that zone, those institutions are likely to add to their positions.\n\n<strong>Bullish OB</strong>: last red candle before price breaks structure upward. Treat the OB zone (high to low of that candle) as support when price retraces.\n\n<strong>Bearish OB</strong>: last green candle before a downside structural break. Treat it as resistance.\n\nThe DBN indicator marks OB zones automatically and fires an entry signal when price returns to test them.`,

        pills: ['OB', 'Support/Resistance', 'Confluence', 'DBN Signal']
      },

        tag: 'ICT Concept',
        subtitle: 'Only buy cheap, only sell expensive — the institutional price rule',
        body: `Every daily range has a midpoint (equilibrium). Price above that midpoint is in <strong>Premium</strong>. Price below is in <strong>Discount</strong>.\n\nThe institutional rule is simple:\n• <strong>Only take longs in Discount</strong> (buy when price is cheap)\n• <strong>Only take shorts in Premium</strong> (sell when price is expensive)\n\nThis filters out a massive number of low-quality trades. A bullish signal in premium zone is a signal to ignore — you'd be buying at the top of the daily range, which is where institutions are selling.\n\nThe DBN indicator enforces this automatically when the Premium/Discount filter is enabled.`,
        highlight: 'If you\'re taking a long trade and price is above the daily midpoint, you\'re buying in premium. Institutions are selling there, not buying. Wait for discount.',
        pills: ['Equilibrium', 'Discount', 'Premium', 'Filter']
      }
    ]
  },
  {
    id: 'strategies',
    icon: '⚡',
    title: 'The 5 DBN Strategies',
    desc: 'Each strategy explained — when it fires, why it works, and how to grade the signals.',
    accent: '#FFD700',
    tag: 'free',
    concepts: [
      {

        tag: 'DBN Strategy',
        subtitle: 'The highest conviction setup in the system',
        body: `<strong>S1</strong> is the flagship DBN strategy. It requires the most confluence and produces the highest quality signals.\n\n<strong>Entry sequence:</strong>\n1. Price sweeps below a Swing Low (SSL grab)\n2. RSI confirms oversold at the moment of sweep\n3. Price reverses and closes above the Swing Low\n4. A Change of Character (CHoCH) prints to the upside\n5. Price retraces into the OTE zone (62–79%)\n6. DBN fires the entry signal\n\n<strong>Why it works:</strong> By the time S1 fires, institutions have already swept stops, reversed, broken structure, and are now pulling price back to fill remaining orders. You're entering on the second institutional push — with the trend freshly established.\n\nBest timeframe: 15m. Best session: London open (07:00–09:00 GMT) or NY (13:00–15:00 GMT).`,

      },
      {

        tag: 'DBN Strategy',

        body: `<strong>S2</strong> triggers when price is trending and pulls back to the fast EMA, then confirms continuation direction.\n\n<strong>Entry conditions:</strong>\n• Clear HTF bias (1H EMA confirms direction)\n• Price pulls back to the 20 EMA on 15m\n• An FVG is present in the pullback zone\n• Volume is above average\n• Price closes back through the EMA in trend direction\n\n<strong>Why it works:</strong> Institutions don't enter on breakouts — they enter on pullbacks. When price retraces to the EMA and an FVG exists in that zone, that's institutional accumulation before the next leg of the trend.\n\nS2 is the most frequent signal in trending markets. Best for XAU/USD during sustained trends.`,
        highlight: 'S2 without HTF alignment is noise. Always check the 1H chart before trusting an S2 signal. The bias filter does this automatically when enabled.',

      },
      {

function App() {
  const [page, setPage] = useState('home');
  const [activeModuleId, setActiveModuleId] = useState(null);
  const [activeConcept, setActiveConcept] = useState(0);
  const [quizModuleId, setQuizModuleId] = useState(null);
  const [quizIdx, setQuizIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [quizDone, setQuizDone] = useState(false);
  const [completed, setCompleted] = useState({});
  const [xp, setXp] = useState(0);

  const totalConcepts = MODULES.reduce((a, m) => a + m.concepts.length, 0);
  const completedCount = Object.keys(completed).length;
  const xpPct = Math.min((xp / 2000) * 100, 100);

  const markDone = (moduleId, conceptId) => {
    const key = `${moduleId}::${conceptId}`;
    if (!completed[key]) {
      setCompleted(p => ({ ...p, [key]: true }));
      setXp(x => x + 50);
    }
  };

  const startQuiz = (moduleId) => {
    setQuizModuleId(moduleId);
    setQuizIdx(0);
    setSelected(null);
    setAnswered(false);
    setScore(0);
    setQuizDone(false);
    setPage('quiz');
  };

  const nextQ = () => {
    const qs = QUIZZES[quizModuleId] || [];
    if (quizIdx + 1 < qs.length) {
      setQuizIdx(i => i + 1);
      setSelected(null);
      setAnswered(false);
    } else {
      setQuizDone(true);
    }
  };

  const activeModule = MODULES.find(m => m.id === activeModuleId);
  const quizModule = MODULES.find(m => m.id === quizModuleId);

  const Sidebar = () => (
    <div className="sidebar">
      <div className="sidebar-logo">
        <div className="brand">DBN Academy</div>
        <div className="tagline">Learn to trade like an institution</div>
      </div>
      <div className="xp-bar-wrap">
        <div className="xp-label"><span>XP Progress</span><span>{xp} / 2000 XP</span></div>
        <div className="xp-bar"><div className="xp-fill" style={{width: xpPct + '%'}}></div></div>
        <div className="xp-stats">{completedCount} / {totalConcepts} concepts complete</div>
      </div>
      <div className="sidebar-nav">
        <div className={`nav-item${page === 'home' ? ' active' : ''}`} onClick={() => setPage('home')}>
          <span className="nav-icon">🏠</span>
          <span className="nav-title">Home</span>
        </div>
        {MODULES.map(m => {
          const done = m.concepts.filter(c => completed[`${m.id}::${c.id}`]).length;
          return (
            <div key={m.id}
              className={`nav-item${activeModuleId === m.id && (page === 'module' || page === 'concept') ? ' active' : ''}`}
              onClick={() => { setActiveModuleId(m.id); setActiveConcept(0); setPage('module'); }}
            >
              <span className="nav-icon">{m.icon}</span>
              <span className="nav-title">{m.title}</span>
              {done > 0 && <span className="nav-count">{done}/{m.concepts.length}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );

  // ── HOME VIEW
  if (page === 'home') {
    return (
      <div className="app">
        <Sidebar />
        <main className="main">
          <div className="home-header">
            <h1>DBN Trading Academy</h1>
            <p>Master institutional trading concepts — free, structured, and built for serious retail traders.</p>
          </div>
          <div className="module-grid">
            {MODULES.map(m => {
              const done = m.concepts.filter(c => completed[`${m.id}::${c.id}`]).length;
              const pct = Math.round((done / m.concepts.length) * 100);
              return (
                <div key={m.id} className="module-card"
                  onClick={() => { setActiveModuleId(m.id); setActiveConcept(0); setPage('module'); }}
                  style={{borderTop: `3px solid ${m.accent}`}}
                >
                  <div className="module-card-header">
                    <span className="module-icon-wrap">{m.icon}</span>
                    <span className={`module-tag ${m.tag}`}>{m.tag}</span>
                  </div>
                  <h3>{m.title}</h3>
                  <p>{m.desc}</p>
                  <div className="module-meta">{m.concepts.length} concepts · {done > 0 ? `${done} done` : 'not started'}</div>
                  {done > 0 && (
                    <div className="module-progress">
                      <div className="module-progress-fill" style={{width: pct + '%', background: m.accent}}></div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </main>
      </div>
    );
  }

  // ── MODULE VIEW
  if (page === 'module' && activeModule) {
    return (
      <div className="app">
        <Sidebar />
        <main className="main">
          <div className="module-page-header">
            <div className="module-title-row">
              <span className="big-icon">{activeModule.icon}</span>
              <h2>{activeModule.title}</h2>
            </div>
            <p>{activeModule.desc}</p>
          </div>
          <div className="concept-list">
            {activeModule.concepts.map((c, i) => {
              const isDone = !!completed[`${activeModule.id}::${c.id}`];
              return (
                <div key={c.id} className={`concept-item${isDone ? ' done' : ''}`}
                  onClick={() => { setActiveConcept(i); setPage('concept'); }}

                  <div className="concept-item-left">
                    <div className="concept-item-tag">{c.tag}</div>
                    <div className="concept-item-name">{c.name}</div>
                    <div className="concept-item-sub">{c.subtitle}</div>
                  </div>
                  <div className="concept-item-right">
                    {isDone && <span className="done-badge">✓</span>}
                    <span className="chevron">›</span>
                  </div>
                </div>
              );
            })}
          </div>
          {QUIZZES[activeModule.id] && (
            <div className="quiz-btn" onClick={() => startQuiz(activeModule.id)}>
              🧠 Take the {activeModule.title} Quiz ({QUIZZES[activeModule.id].length} questions)
            </div>
          )}
        </main>
      </div>
    );
  }

  // ── CONCEPT VIEW
  if (page === 'concept' && activeModule) {
    const concept = activeModule.concepts[activeConcept];
    const isDone = !!completed[`${activeModule.id}::${concept.id}`];
    return (
      <div className="app">
        <Sidebar />
        <main className="main">
          <div className="concept-reader">
            <div className="back-btn" onClick={() => setPage('module')}>← Back to {activeModule.title}</div>
            <div className="concept-reader-header" style={{marginTop: 16}}>
              <div className="concept-reader-tag">{concept.tag}</div>
              <div className="concept-reader-title">{concept.name}</div>
              <div className="concept-reader-sub">{concept.subtitle}</div>
            </div>
            <div className="concept-body" dangerouslySetInnerHTML={{__html: concept.body.replace(/\\n\\n/g, '<br/><br/>').replace(/\\n/g, '<br/>')}} />
            <div className="concept-highlight">{concept.highlight}</div>
            <div className="pills-row">{concept.pills.map(p => <span key={p} className="pill">{p}</span>)}</div>
            <div className="concept-nav">
              <button className="nav-btn" disabled={activeConcept === 0} onClick={() => setActiveConcept(i => i - 1)}>← Prev</button>
              <button className={`mark-done-btn${isDone ? ' done' : ''}`} onClick={() => markDone(activeModule.id, concept.id)}>
                {isDone ? '✓ Completed' : 'Mark as Done (+50 XP)'}
              </button>
              <button className="nav-btn" disabled={activeConcept === activeModule.concepts.length - 1} onClick={() => setActiveConcept(i => i + 1)}>Next →</button>
            </div>
          </div>
        </main>
      </div>
    );
  }

  // ── QUIZ VIEW
  if (page === 'quiz' && quizModule) {
    const qs = QUIZZES[quizModuleId] || [];
    if (quizDone) {
      const pct = Math.round((score / qs.length) * 100);
      return (
        <div className="app">
          <Sidebar />
          <main className="main">
            <div className="quiz-wrap">
              <div className="quiz-done">
                <div className="quiz-done-icon">{pct >= 80 ? '🏆' : pct >= 60 ? '📈' : '📚'}</div>
                <h3>{pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort!' : 'Keep studying!'}</h3>
                <p>You scored <strong>{score} / {qs.length}</strong> ({pct}%) on the {quizModule.title} quiz.</p>
                <button className="retake-btn" onClick={() => { setQuizIdx(0); setSelected(null); setAnswered(false); setScore(0); setQuizDone(false); }}>Retake Quiz</button>
                <button className="next-btn" onClick={() => { setPage('module'); }}>Back to Module</button>
              </div>
            </div>
          </main>
        </div>
      );
    }
    const q = qs[quizIdx];
    return (
      <div className="app">
        <Sidebar />
        <main className="main">
          <div className="quiz-wrap">
            <div className="quiz-header">
              <h2>{quizModule.title} Quiz</h2>
              <div className="quiz-progress-text">Question {quizIdx + 1} of {qs.length} · Score: {score}</div>
              <div className="quiz-bar"><div className="quiz-bar-fill" style={{width: ((quizIdx) / qs.length * 100) + '%'}}></div></div>
            </div>
            <div className="question-card">
              {q.hint && <div className="question-hint">💡 Hint: {q.hint}</div>}
              <div className="question-text">{q.q}</div>
              <div className="options">
                {q.options.map((opt, i) => {
                  let cls = 'option';
                  if (answered) {
                    cls += ' locked';
                    if (i === q.answer) cls += ' correct';
                    else if (i === selected) cls += ' wrong';
                  } else if (i === selected) {
                    cls += ' selected';
                  }
                  return (
                    <button key={i} className={cls} onClick={() => { if (!answered) setSelected(i); }}>
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
            {answered && <div className="explanation">{q.explanation}</div>}
            <div className="quiz-actions">
              <span className="score-badge">Score: {score} / {qs.length}</span>
              {!answered && selected !== null && (
                <button className="next-btn" onClick={() => { setAnswered(true); if (selected === q.answer) setScore(s => s + 1); }}>
                  Check Answer
                </button>
              )}
              {answered && (
                <button className="next-btn" onClick={nextQ}>
                  {quizIdx + 1 < qs.length ? 'Next Question →' : 'See Results'}
                </button>
              )}
            </div>
          </div>
        </main>
      </div>
    );
  }

  return <div className="app"><Sidebar /><main className="main"><p style={{color:'#8b949e'}}>Loading...</p></main></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
